{% extends "base.html" %}
{% block title %}Manage Users – Remote Monitor{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Manage Users</h1>
  <button class="btn btn-primary" onclick="showModal('create-user-modal')">+ New User</button>
</div>

<div class="table-wrap">
  <table class="data-table">
    <thead><tr><th>Username</th><th>Role</th><th>Created</th><th>Actions</th></tr></thead>
    <tbody id="users-tbody"><tr><td colspan="4">Loading…</td></tr></tbody>
  </table>
</div>

<!-- Create User Modal -->
<div class="modal-overlay" id="create-user-modal" style="display:none">
  <div class="modal">
    <h2>Create User</h2>
    <form id="create-user-form">
      <div class="form-group"><label>Username</label><input type="text" name="username" required/></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required/></div>
      <div class="form-group">
        <label>Role</label>
        <select name="role"><option value="user">User</option><option value="admin">Admin</option></select>
      </div>
      <div id="create-err" class="alert alert-error" style="display:none"></div>
      <div class="modal-actions">
        <button type="button" class="btn" onclick="hideModal('create-user-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Create</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadUsers() {
  await requireAuth('admin');
  const users = await apiFetch('/api/users');
  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = users.map(u => `
    <tr>
      <td>${u.username}</td>
      <td><span class="role-badge ${u.role}">${u.role}</span></td>
      <td>${new Date(u.created_at).toLocaleDateString()}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}','${u.username}')">Delete</button></td>
    </tr>`).join('');
}

document.getElementById('create-user-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const err = document.getElementById('create-err');
  err.style.display = 'none';
  const res = await fetch('/api/users', { method: 'POST', body: fd, credentials: 'include' });
  const data = await res.json();
  if (!res.ok) { err.textContent = data.detail; err.style.display = 'block'; return; }
  hideModal('create-user-modal');
  e.target.reset();
  loadUsers();
});

async function deleteUser(id, name) {
  if (!confirm(`Delete user "${name}"?`)) return;
  await apiFetch(`/api/users/${id}`, { method: 'DELETE' });
  loadUsers();
}

loadUsers();
</script>
{% endblock %}
