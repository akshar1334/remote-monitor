<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Remote Monitor</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">🖥️</div>
    <h1 class="login-title">Remote Monitor</h1>
    <p class="login-subtitle">Sign in to your account</p>

    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" name="username" required autofocus placeholder="admin"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••"/>
      </div>
      <div id="login-error" class="alert alert-error" style="display:none"></div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const err = document.getElementById('login-error');
      err.style.display = 'none';
      try {
        const res = await fetch('/api/auth/login', { method: 'POST', body: fd, credentials: 'include' });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.detail || 'Login failed'; err.style.display = 'block'; return; }
        window.location.href = '/dashboard';
      } catch {
        err.textContent = 'Network error'; err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
